<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart || Register Page</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/all.css"/>
   
</head>
<body>

    <header>
         <div class="container">

             <div class="header-content">
                <a href="index.html" class="brand">Shopping Cart</a>

              <nav>
                  <ul>
                      <li><a href="login.html">Sing in</a></li>
                      <li><a href="register.html">Sign up</a></li>
                  </ul>
              </nav>
             </div>
              
         </div>
    </header>
    
    <section class="section-form">
        <h2>Register User</h2>
        <form >
            <input type="text" placeholder="Enter Username" id="username">
            <input type="email" placeholder="Enter email" id="email">
            <input type="password" placeholder="Enter password" id="password">

            <input type="submit" value= "sign up" id="sign_up">
            <p style="margin-top:10px;color:var(--muted);">
  Have an account?
  <a href="login.html" style="font-weight:700;">Login</a>
</p>

        </form>
    </section>
    

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/user.js"></script>
<script src="js/register.js"></script>

<div id="toast" style="
  position:fixed;left:50%;top:24px;transform:translateX(-50%);
  background:rgba(34,197,94,.95);color:#0b1021;
  padding:12px 16px;border-radius:10px;font-weight:800;
  box-shadow:0 10px 30px rgba(0,0,0,.25);display:none;z-index:9999;">
  Account created successfully
</div>

</body>
</html>
